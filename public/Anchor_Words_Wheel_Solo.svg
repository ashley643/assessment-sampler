<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- 8-segment donut wheel representing the 8 Anchor Attributes -->
  <!-- Outer r=140, inner r=52, center (150,150) -->
  <!-- Seg 0: 270°→315° Curiosity -->
  <path d="M 150 10 A 140 140 0 0 1 249 51 L 187 115 A 52 52 0 0 0 150 98 Z" fill="#F59E0B" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <!-- Seg 1: 315°→360° Perspective-Taking -->
  <path d="M 249 51 A 140 140 0 0 1 290 150 L 202 150 A 52 52 0 0 0 187 115 Z" fill="#3B82F6" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <!-- Seg 2: 0°→45° Purpose -->
  <path d="M 290 150 A 140 140 0 0 1 249 249 L 187 185 A 52 52 0 0 0 202 150 Z" fill="#10B981" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <!-- Seg 3: 45°→90° Self-Control -->
  <path d="M 249 249 A 140 140 0 0 1 150 290 L 150 202 A 52 52 0 0 0 187 185 Z" fill="#7C3AED" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <!-- Seg 4: 90°→135° Grit -->
  <path d="M 150 290 A 140 140 0 0 1 51 249 L 113 185 A 52 52 0 0 0 150 202 Z" fill="#EF4444" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <!-- Seg 5: 135°→180° Growth Mindset -->
  <path d="M 51 249 A 140 140 0 0 1 10 150 L 98 150 A 52 52 0 0 0 113 185 Z" fill="#0D9488" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <!-- Seg 6: 180°→225° Compassion -->
  <path d="M 10 150 A 140 140 0 0 1 51 51 L 113 115 A 52 52 0 0 0 98 150 Z" fill="#DB2777" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <!-- Seg 7: 225°→270° Gratitude -->
  <path d="M 51 51 A 140 140 0 0 1 150 10 L 150 98 A 52 52 0 0 0 113 115 Z" fill="#D97706" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <!-- White donut center -->
  <circle cx="150" cy="150" r="47" fill="white"/>
  <!-- Center icon -->
  <circle cx="150" cy="150" r="28" fill="none" stroke="#1a2744" stroke-width="2.5"/>
  <line x1="150" y1="122" x2="150" y2="178" stroke="#1a2744" stroke-width="2.5"/>
  <line x1="122" y1="150" x2="178" y2="150" stroke="#1a2744" stroke-width="2.5"/>
  <circle cx="150" cy="150" r="6" fill="#1a2744"/>
</svg>
